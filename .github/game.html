   UDJ STAGE 10 — SONY INVESTOR DEMO BUILD
   ADDITIVE CSS — append to existing game stylesheet
   ============================================================ */

/* ---- DEMO THEATER SCREEN ---- */
#sonyDemoScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 100;
  overflow: hidden;
  font-family: 'Georgia', 'Times New Roman', serif;
  color: #f0eedd;
}
#sonyDemoScreen.active { display: flex; flex-direction: column; }

/* ---- TOP BAR ---- */
.demo-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  background: rgba(0,0,0,0.9);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
  z-index: 10;
}
.demo-topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.demo-topbar-logo .logo-text {
  font-family: 'Courier New', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: #554433;
  text-transform: uppercase;
}
.demo-topbar-logo .logo-name {
  font-size: 1rem;
  color: #f0e8d0;
  font-weight: normal;
  letter-spacing: 0.05em;
}
.demo-topbar-center {
  font-family: 'Courier New', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  color: #332211;
  text-transform: uppercase;
  text-align: center;
}
.demo-topbar-right {
  display: flex;
  gap: 8px;
  align-items: center;
}
.demo-topbar-btn {
  padding: 6px 14px;

}
.demo-topbar-btn:hover { border-color: rgba(255,255,255,0.25); color: #ccbbaa; }

}
.demo-topbar-btn.primary:hover { background: rgba(200,30,0,0.25); }

/* ---- SLIDE LAYOUT ---- */
.demo-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Left slide nav */
.demo-slide-nav {
  width: 200px;
  flex-shrink: 0;
  background: rgba(3,2,1,0.97);
  border-right: 1px solid rgba(255,255,255,0.04);
  overflow-y: auto;
  padding: 12px 0;
}
.slide-nav-item {
  padding: 10px 14px;

  border-left: 2px solid transparent;

  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.slide-nav-item:hover { background: rgba(255,255,255,0.03); }
.slide-nav-item.active { border-left-color: #cc3300; background: rgba(150,30,0,0.08); }

.sni-title { font-size: 0.65rem; color: #776655; line-height: 1.3; }
.slide-nav-item.active .sni-title { color: #cc9977; }

/* Right: slide content */
.demo-slide-area {
  flex: 1;
  overflow-y: auto;
  background: radial-gradient(ellipse at 30% 20%, #060203 0%, #020101 60%, #000 100%);
  position: relative;
}

/* ---- SLIDES ---- */
.demo-slide {
  display: none;
  min-height: 100%;
  padding: 48px 56px;
  animation: slide-enter 0.4s ease both;
}
.demo-slide.active { display: block; }
@keyframes slide-enter {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---- SLIDE EYEBROW ---- */
.slide-eyebrow {
  font-family: 'Courier New', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.35em;
  color: #441100;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.slide-title {
  font-size: 2.2rem;
  color: #f5ead0;
  font-weight: normal;
  line-height: 1.15;
  margin-bottom: 8px;
  letter-spacing: 0.02em;
}
.slide-title em { font-style: normal; color: #cc3300; }
.slide-subtitle {
  font-size: 0.9rem;
  color: #665544;
  font-style: italic;
  margin-bottom: 36px;
  line-height: 1.6;
  max-width: 640px;
}

/* ---- DIVIDER ---- */
.slide-divider {
  height: 1px;
  background: linear-gradient(90deg, rgba(150,30,0,0.5), transparent);
  margin: 28px 0;
}

/* ---- TWO-COLUMN LAYOUT ---- */
.slide-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-bottom: 32px; }
.slide-three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; margin-bottom: 28px; }

/* ---- DATA BOXES ---- */
.data-box {
  background: rgba(10,4,2,0.8);
  border: 1px solid rgba(150,60,0,0.2);
  border-radius: 8px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.data-box::before {
  content: '';

  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, #cc3300, transparent);
}

.data-box .db-val.green { color: #44cc88; }

.data-box .db-label { font-size: 0.6rem; color: #554433; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; }
.data-box .db-desc  { font-size: 0.68rem; color: #6a5040; line-height: 1.5; }
.data-box .db-source { font-size: 0.55rem; color: #332211; margin-top: 8px; font-style: italic; }

.feature-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
.feature-item {

.feature-item:hover { border-color: rgba(200,60,0,0.35); }
.fi-icon { font-size: 1.3rem; margin-bottom: 6px; }
.fi-name { font-size: 0.72rem; color: #cc9977; margin-bottom: 3px; }
.fi-desc { font-size: 0.6rem; color: #554433; line-height: 1.4; }

/* ---- VALUATION TABLE ---- */
.valuation-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; font-size: 0.72rem; }
.valuation-table th {
  text-align: left;
  padding: 8px 12px;
  font-family: 'Courier New', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  color: #442211;
  text-transform: uppercase;

}
.valuation-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #9a7a60; vertical-align: top; }
.valuation-table tr:hover td { background: rgba(80,20,0,0.1); }
.valuation-table .val-amount { color: #ff8855; font-family: 'Courier New', monospace; white-space: nowrap; }
.valuation-table .val-total td { color: #f5ead0; border-top: 1px solid rgba(150,50,0,0.4); padding-top: 14px; }
.valuation-table .val-total .val-amount { color: #ffcc44; font-size: 1rem; }

/* ---- ESG BLOCK ---- */
.esg-block {
  background: linear-gradient(135deg, rgba(0,15,5,0.9) 0%, rgba(0,8,3,0.95) 100%);

  padding: 24px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.esg-block::before {
  content: '';

}
.esg-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.esg-icon { font-size: 2rem; }
.esg-header-text h3 { font-size: 1rem; color: #44cc88; margin: 0 0 3px; }
.esg-header-text p  { font-size: 0.65rem; color: #226633; margin: 0; }
.esg-partners { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.esg-partner {

  border: 1px solid rgba(0,120,40,0.25);
  border-radius: 20px;
  font-family: 'Courier New', monospace;
  font-size: 0.6rem;
  color: #44aa66;
  letter-spacing: 0.08em;
}
.esg-mechanic { font-size: 0.72rem; color: #336644; line-height: 1.6; }
.esg-mechanic strong { color: #44cc77; }

/* ---- COMP TABLE ---- */
.comp-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 0.68rem; }
.comp-table th { padding: 8px 10px; font-family: 'Courier New', monospace; font-size: 0.55rem; letter-spacing: 0.1em; color: #442211; text-transform: uppercase; border-bottom: 1px solid rgba(150,50,0,0.2); text-align: center; }
.comp-table th:first-child { text-align: left; }
.comp-table td { padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #7a5a40; text-align: center; }
.comp-table td:first-child { text-align: left; color: #cc9977; }
.comp-table .comp-yes { color: #44cc88; }
.comp-table .comp-no  { color: #442211; }
.comp-table .comp-us  { background: rgba(80,20,0,0.15); }
.comp-table .comp-us td { color: #ffcc88; }
.comp-table .comp-us td:first-child { color: #ff8855; font-weight: bold; }

/* ---- REVENUE MODEL ---- */
.revenue-stream {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px;
  background: rgba(8,3,1,0.7);
  border: 1px solid rgba(100,40,0,0.18);
  border-radius: 6px;
  margin-bottom: 10px;
}
.rs-icon { font-size: 1.4rem; flex-shrink: 0; }
.rs-info { flex: 1; }
.rs-name { font-size: 0.78rem; color: #cc9977; margin-bottom: 2px; }
.rs-desc { font-size: 0.62rem; color: #554433; }
.rs-amount { font-family: 'Courier New', monospace; font-size: 0.9rem; color: #44cc88; text-align: right; flex-shrink: 0; }
.rs-pct { font-size: 0.6rem; color: #336644; text-align: right; }

/* ---- ROADMAP ---- */
.roadmap-item {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  position: relative;
}
.roadmap-item::before {
  content: '';
  position: absolute;
  left: 19px;
  top: 36px;
  bottom: -20px;
  width: 1px;
  background: linear-gradient(180deg, rgba(150,50,0,0.3), transparent);
}
.roadmap-item:last-child::before { display: none; }
.ri-dot {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(150,50,0,0.3);
  background: rgba(10,4,2,0.8);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.ri-dot.done { border-color: #44cc88; background: rgba(0,40,15,0.5); }
.ri-dot.current { border-color: #ff8855; background: rgba(60,15,0,0.5); animation: ri-pulse 1.5s ease-in-out infinite; }
@keyframes ri-pulse { 0%,100%{box-shadow:0 0 0 rgba(255,136,85,0);} 50%{box-shadow:0 0 15px rgba(255,136,85,0.3);} }
.ri-content { flex: 1; padding-top: 8px; }
.ri-phase { font-family: 'Courier New', monospace; font-size: 0.55rem; color: #442211; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 3px; }
.ri-name { font-size: 0.85rem; color: #cc9977; margin-bottom: 4px; }
.ri-name.done { color: #44aa66; }
.ri-desc { font-size: 0.65rem; color: #554433; line-height: 1.5; }

/* ---- ASK BLOCK ---- */
.ask-block {
  background: linear-gradient(135deg, rgba(15,5,0,0.95) 0%, rgba(8,2,0,0.98) 100%);
  border: 1px solid rgba(200,80,0,0.3);
  border-radius: 12px;
  padding: 32px;
  text-align: center;
  margin-bottom: 28px;
  position: relative;
  overflow: hidden;
}
.ask-block::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center top, rgba(200,60,0,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.ask-amount {
  font-family: 'Courier New', monospace;
  font-size: 3.5rem;
  color: #ffcc44;
  text-shadow: 0 0 40px rgba(255,204,0,0.3);
  line-height: 1;
  margin-bottom: 8px;
}
.ask-range { font-size: 0.65rem; color: #665533; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 24px; }
.ask-breakdown { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.ask-item { text-align: center; }
.ask-item .ai-pct { font-size: 1.3rem; color: #ff8855; font-family: 'Courier New', monospace; margin-bottom: 4px; }
.ask-item .ai-label { font-size: 0.58rem; color: #554433; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.ask-item .ai-amount { font-size: 0.72rem; color: #886644; }

/* ---- QUOTE BLOCK ---- */
.quote-block {
  border-left: 3px solid rgba(200,80,0,0.4);
  padding: 16px 20px;
  margin-bottom: 24px;
  background: rgba(8,3,1,0.4);
  border-radius: 0 6px 6px 0;
}
.quote-block p { font-size: 0.85rem; color: #aa8866; line-height: 1.7; font-style: italic; margin: 0 0 8px; }
.quote-block cite { font-family: 'Courier New', monospace; font-size: 0.58rem; color: #553322; letter-spacing: 0.1em; text-transform: uppercase; }

/* ---- CLOSING SLIDE ---- */
.closing-slide {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  min-height: calc(100vh - 120px);
  padding: 48px;
}
.closing-seal {
  width: 100px; height: 100px;
  border-radius: 50%;
  border: 1px solid rgba(200,80,0,0.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem;
  background: rgba(20,5,0,0.6);
  margin-bottom: 28px;
  box-shadow: 0 0 40px rgba(200,80,0,0.1);
  animation: seal-glow 3s ease-in-out infinite;
}
@keyframes seal-glow { 0%,100%{box-shadow:0 0 20px rgba(200,80,0,0.1);} 50%{box-shadow:0 0 50px rgba(200,80,0,0.25);} }
.closing-title { font-size: 2.4rem; color: #f5ead0; font-weight: normal; margin-bottom: 12px; line-height: 1.2; }
.closing-sub { font-size: 0.78rem; color: #665544; font-style: italic; max-width: 480px; line-height: 1.7; margin-bottom: 32px; }
.closing-contacts { display: flex; gap: 24px; justify-content: center; flex-wrap: wrap; }
.closing-contact {

  background: rgba(8,3,1,0.8);
  border: 1px solid rgba(150,50,0,0.25);
  border-radius: 6px;
  font-family: 'Courier New', monospace;
  font-size: 0.6rem;
  color: #886655;
  letter-spacing: 0.08em;
  text-align: center;
}
.closing-contact strong { display: block; color: #cc9977; margin-bottom: 3px; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.15em; }

/* ---- SLIDE FOOTER (page indicator) ---- */
.demo-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 24px;
  background: rgba(0,0,0,0.9);

  flex-shrink: 0;
}
.demo-footer-dots { display: flex; gap: 6px; }
.footer-dot { width: 6px; height: 6px; border-radius: 50%; background: #1a0a05; cursor: pointer; transition: background 0.2s; }
.footer-dot.active { background: #cc3300; }
.footer-dot:hover { background: #664422; }
.demo-footer-nav { display: flex; gap: 8px; }
.footer-nav-btn {
  padding: 6px 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  color: #554433;
  font-family: 'Courier New', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}
.footer-nav-btn:hover { border-color: rgba(200,80,0,0.3); color: #cc7755; }
.demo-footer-info { font-family: 'Courier New', monospace; font-size: 0.55rem; color: #221108; letter-spacing: 0.1em; }

/* ---- BACK BTN ---- */
.demo-exit-btn {
  position: fixed;
  top: 72px; left: 14px;
  padding: 6px 12px;

}
.demo-exit-btn:hover { border-color: rgba(200,80,0,0.3); color: #cc7755; }
</style>
</head>

    if (counter) counter.textContent = `Slide ${currentSlide+1} of ${SLIDES.length}`;
